

server:
  port: 8090

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        # AUTH (login/register)
        - id: auth-service
          uri: http://localhost:8091
          predicates:
            - Path=/auth/**

        # USER service
        - id: user-service
          uri: http://localhost:8091
          predicates:
            - Path=/user/**

        # ADMIN service (ALL modules cover)
        - id: admin-service
          uri: http://localhost:8092
          predicates:
            - Path=/admin/**

      # for geting the products or explore page section
        - id: catalog-service
          uri: http://localhost:8092
          predicates:
            - Path=/catalog/**